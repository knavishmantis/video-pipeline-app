name: Sync YouTube Analytics

on:
  schedule:
    # Every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch: # Allow manual triggers

jobs:
  sync-analytics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install google-api-python-client google-auth google-auth-oauthlib pandas

      - name: Run analytics sync
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          SYNC_API_KEY: ${{ secrets.SYNC_API_KEY }}
        run: python scripts/sync_youtube_analytics.py
